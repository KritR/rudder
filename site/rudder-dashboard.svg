<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2440 1260" role="img" aria-labelledby="title desc">
  <title id="title">Rudder dashboard running Codex in a worker pane</title>
  <desc id="desc">A light terminal dashboard with an agents pane, a focused worker pane, and a task input pane.</desc>
  <rect width="2440" height="1210" rx="18" fill="#eef1f7"/>
  <rect x="8" y="8" width="2424" height="1194" rx="16" fill="#eef1f7" stroke="#a4a9b8" stroke-width="2"/>

  <g font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22" fill="#52586e">
